x-app-service: &app-service
  build:
    context: .
    dockerfile: Dockerfile.dev
  image: "books.mtdr-dev:latest"
  volumes:
    - .:/app
    - ./tmp/bundle:/usr/local/bundle
    - ~/.gitconfig:/root/.gitconfig

services:
  jobs:
    <<: *app-service
    command: bundle exec bin/jobs
    profiles:
      - web
      - admin

  production:
    build:
      context: .
      dockerfile: Dockerfile
    image: "books.mtdr-prod:local"
    environment:
      RAILS_ENV: production
      ENV_NAME: production
      SECRET_KEY_BASE: dummy
      DATABASE_PATH: /data
    command: bundle exec puma -C config/puma.rb
    ports:
      - "3010:3000"
    volumes:
      - ./tmp/data:/data
    profiles:
      - production

  shell:
    <<: *app-service
    command: bash
    stdin_open: true
    tty: true
    depends_on: []
    profiles:
      - shell

  web:
    <<: *app-service
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b 0.0.0.0"
    ports:
      - "3010:3000"
    depends_on:
      - jobs
      - webpacker
    stdin_open: true
    tty: true
    profiles:
      - admin
      - web

  webpacker:
    <<: *app-service
    command: bash -c "rm -rf /app/public/packs; /app/bin/webpack-dev-server"
    ports:
      - "3035:3035"
    profiles:
      - admin
      - tools
      - web

volumes:
  data:
