# fly.toml app configuration file generated for books-mthdr on 2026-03-13T20:04:04+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'books-mthdr'
primary_region = 'fra'
console_command = 'bin/rails console'

[build]

[env]
  RAILS_ENV="production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
